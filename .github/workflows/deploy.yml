name: Deploy Nuxt 4 App
on:
  push:
    branches: [main] # Change to your default branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node.js to execute Nuxt 4's build process
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Change to pnpm or yarn if needed

      - name: Install dependencies
        run: npm install

      # Build Nuxt using the explicit Deno Deploy environment variable
      - name: Build Nuxt Application
        run: npm run build
        env:
          NITRO_PRESET: deno_deploy

      # Explicitly pass the root and entrypoint paths here
      - name: Deploy to Deno Deploy
        uses: denoland/deployctl@v1
        with:
          project: "trading-dashboard" # Must match your Deno dashboard name
          entrypoint: "server/index.ts" # This points to the compiled entry file
          root: ".output"
